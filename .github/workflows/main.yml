name: Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
      - run: deno task verify
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
      - run: deno task build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs:
      - verify
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v5
